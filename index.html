<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Handler Simulation</title>
  </head>
  <body>
    <div id="app">
      <section id="simulation-pane" aria-label="Liquid handler simulator"></section>
      <section id="script-pane" aria-label="Python scripting editor">
        <div class="editor-toolbar">
          <div>
            <h1>Protocol Editor</h1>
          </div>
          <div class="toolbar-actions">
            <a class="icon-button" href="https://github.com/Rojetto/liquid-handler" target="_blank" rel="noreferrer" aria-label="Open GitHub repository" title="Open GitHub repository">
              <svg aria-hidden="true" viewBox="0 0 16 16" width="17" height="17" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.64 0 8.13c0 3.59 2.29 6.63 5.47 7.71.4.07.55-.18.55-.39 0-.19-.01-.83-.01-1.5-2.01.38-2.53-.5-2.69-.96-.09-.23-.48-.96-.82-1.15-.28-.15-.68-.52-.01-.53.63-.01 1.08.59 1.23.83.72 1.23 1.87.88 2.33.67.07-.53.28-.88.51-1.08-1.78-.21-3.64-.91-3.64-4.02 0-.89.31-1.62.82-2.19-.08-.2-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.45 7.45 0 0 1 8 3.93c.68 0 1.36.09 2 .27 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.96.08 2.16.51.57.82 1.3.82 2.19 0 3.12-1.87 3.81-3.65 4.02.29.25.54.74.54 1.5 0 1.08-.01 1.95-.01 2.22 0 .21.15.47.55.39A8.08 8.08 0 0 0 16 8.13C16 3.64 12.42 0 8 0Z" />
              </svg>
            </a>
            <button id="readme-help-button" class="icon-button" type="button" aria-label="Open README" title="Open README">?</button>
          </div>
        </div>
        <div id="script-editor"></div>
        <div class="script-actions">
          <button id="run-script-button" type="button">Run</button>
          <button id="reset-world-button" type="button">Reset</button>
          <span id="script-status" role="status">Ready</span>
        </div>
        <pre id="script-output" aria-label="Python output"></pre>
      </section>
      <div id="readme-modal" class="readme-overlay" hidden>
        <section class="readme-dialog" role="dialog" aria-modal="true" aria-labelledby="readme-title">
          <header class="readme-dialog-header">
            <h2 id="readme-title">README</h2>
            <button id="readme-close-button" class="icon-button" type="button" aria-label="Close README" title="Close README">x</button>
          </header>
          <div id="readme-content" class="readme-content"></div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
